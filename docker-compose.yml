x-db-environment: &x-db-environment
  POSTGRES_SSL_MODE: "disable" 
  POSTGRES_PORT: "5433"
  POSTGRES_DB: "db"
  POSTGRES_PASSWORD: "dbpassword123"
  POSTGRES_USER: "user"

x-backend-app-environment: &x-backend-app-environment
  GOMAXPROCS: "1"
  # App
  APP_NAME: "go-clean-template"
  APP_VERSION: "1.0.0"
  # HTTP settings
  HTTP_PORT: "8080"
  # Logger
  LOG_LEVEL: "debug"
  # PG
  PG_POOL_MAX: "2"
  PG_URL: "postgres://user:dbpassword123@db:5433/db"

services:
  db:
    container_name: db
    image: postgres:18.3-alpine
    environment:
      <<: *x-db-environment
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "5433:5432"
    networks:
      app_network:
        aliases:
          - db.lvh.me

  app:
    container_name: app
    platform: linux/amd64
    pid: "host"
    build:
      context: .
    environment:
      <<: *x-backend-app-environment
    ports:
      - "8080:8080"
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: "2Gb"
        reservations:
          cpus: "0.60"
          memory: "1Gb"
    networks:
      app_network:
        aliases:
          - app.lvh.me

networks:
  app_network:
    external: false

volumes:
  db_data:
